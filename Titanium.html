<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Titanium AI</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            /* Динамичный фон для красивого преломления через стекло */
            background: linear-gradient(45deg, #0a0a1a, #1a1a3a, #2a0845, #002b36);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Эффект стекла (Glassmorphism) */
        .app-container {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* Шапка */
        .header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 1px;
            background: linear-gradient(90deg, #e0e0e0, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header i {
            color: #a8b2d1;
            font-size: 20px;
        }

        /* Окно чата */
        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }

        /* Кастомизация скроллбара */
        .chat-box::-webkit-scrollbar { width: 6px; }
        .chat-box::-webkit-scrollbar-track { background: transparent; }
        .chat-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        .message {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 20px;
            line-height: 1.5;
            font-size: 15px;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-user {
            align-self: flex-end;
            background: linear-gradient(135deg, #007aff, #005bb5);
            border-bottom-right-radius: 5px;
            box-shadow: 0 5px 15px rgba(0, 122, 255, 0.3);
        }

        .msg-ai {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom-left-radius: 5px;
        }

        .msg-ai img, .msg-user img {
            max-width: 100%;
            border-radius: 12px;
            margin-top: 10px;
        }

        /* Зона ввода */
        .input-area {
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .file-label {
            cursor: pointer;
            padding: 12px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .file-label:hover { background: rgba(255, 255, 255, 0.15); }
        .file-label i { color: #a8b2d1; font-size: 18px; }
        #file-input { display: none; }

        .text-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 12px 18px;
            color: #fff;
            font-size: 15px;
            outline: none;
            resize: none;
            height: 46px;
            max-height: 120px;
            overflow-y: auto;
            transition: border 0.3s;
        }

        .text-input::placeholder { color: rgba(255, 255, 255, 0.4); }
        .text-input:focus { border-color: rgba(255, 255, 255, 0.3); }

        .send-btn {
            background: #007aff;
            border: none;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 4px 15px rgba(0, 122, 255, 0.4);
        }

        .send-btn:hover { background: #005bb5; transform: scale(1.05); }
        .send-btn i { color: #fff; font-size: 18px; margin-left: -2px; }

        .image-preview {
            display: none;
            padding: 10px 20px;
            background: rgba(0,0,0,0.2);
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .image-preview img {
            height: 60px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .loading {
            align-self: flex-start;
            display: none;
            padding: 12px 18px;
            background: transparent;
        }
        .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #a8b2d1;
            border-radius: 50%;
            margin-right: 3px;
            animation: bounce 1.3s linear infinite;
        }
        .dot:nth-child(2) { animation-delay: -1.1s; }
        .dot:nth-child(3) { animation-delay: -0.9s; margin-right: 0;}

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-5px); }
        }

        /* Адаптация для мобильных устройств (смартфонов) */
        @media (max-width: 768px) {
            .app-container {
                height: 100vh;
                max-width: 100%;
                border-radius: 0;
                border: none;
            }
            .message { max-width: 90%; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="header">
            <i class="fa-solid fa-microchip"></i>
            <h1>Titanium AI</h1>
        </header>

        <div class="chat-box" id="chat-box">
            <div class="message msg-ai">Привет! Я Titanium AI. Чем я могу помочь тебе сегодня? Задавай вопросы или отправляй изображения для анализа.</div>
            
            <div class="loading" id="loading-indicator">
                <span class="dot"></span><span class="dot"></span><span class="dot"></span>
            </div>
        </div>

        <div class="image-preview" id="image-preview-container">
            <img id="image-preview" src="" alt="Preview">
        </div>

        <div class="input-area">
            <label class="file-label" for="file-input">
                <i class="fa-solid fa-paperclip"></i>
            </label>
            <input type="file" id="file-input" accept="image/*">
            
            <textarea class="text-input" id="user-input" placeholder="Введите сообщение..." rows="1"></textarea>
            
            <button class="send-btn" id="send-btn">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script>
        const API_KEY = "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";
        const API_URL = "https://openrouter.ai/api/v1/chat/completions";
        const MODEL = "google/gemini-2.0-flash-001"; // Модель с поддержкой Vision (зрения)

        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const fileInput = document.getElementById('file-input');
        const loadingIndicator = document.getElementById('loading-indicator');
        const previewContainer = document.getElementById('image-preview-container');
        const previewImage = document.getElementById('image-preview');

        let currentImageBase64 = null;
        let chatHistory = [];

        // Автоматическое изменение высоты textarea
        userInput.addEventListener('input', function() {
            this.style.height = '46px';
            this.style.height = (this.scrollHeight) + 'px';
        });

        // Обработка загрузки файла (изображения)
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    currentImageBase64 = event.target.result;
                    previewImage.src = currentImageBase64;
                    previewContainer.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        // Добавление сообщения в UI
        function appendMessage(text, sender, imageUrl = null) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', sender === 'user' ? 'msg-user' : 'msg-ai');
            
            if (text) {
                const textSpan = document.createElement('span');
                // Простая замена переносов строк для HTML
                textSpan.innerHTML = text.replace(/\n/g, '<br>'); 
                msgDiv.appendChild(textSpan);
            }

            if (imageUrl) {
                const img = document.createElement('img');
                img.src = imageUrl;
                msgDiv.appendChild(img);
            }

            // Вставляем сообщение перед индикатором загрузки
            chatBox.insertBefore(msgDiv, loadingIndicator);
            scrollToBottom();
        }

        function scrollToBottom() {
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Отправка запроса к API
        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text && !currentImageBase64) return;

            // Сбрасываем UI
            userInput.value = '';
            userInput.style.height = '46px';
            previewContainer.style.display = 'none';
            const imgToSend = currentImageBase64;
            currentImageBase64 = null;
            fileInput.value = '';

            // Отображаем сообщение пользователя
            appendMessage(text, 'user', imgToSend);
            
            // Формируем контент для API
            let messageContent = [];
            if (text) messageContent.push({ type: "text", text: text });
            if (imgToSend) {
                messageContent.push({ 
                    type: "image_url", 
                    image_url: { url: imgToSend } 
                });
            }

            // Добавляем в историю
            chatHistory.push({ role: "user", content: messageContent });

            loadingIndicator.style.display = 'block';
            scrollToBottom();

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: MODEL,
                        messages: chatHistory
                    })
                });

                const data = await response.json();
                loadingIndicator.style.display = 'none';

                if (data.choices && data.choices.length > 0) {
                    const aiResponseText = data.choices[0].message.content;
                    appendMessage(aiResponseText, 'ai');
                    chatHistory.push({ role: "assistant", content: aiResponseText });
                } else {
                    appendMessage("Ошибка: Неверный ответ от сервера. Проверьте API ключ.", 'ai');
                    console.error("API Error:", data);
                }

            } catch (error) {
                loadingIndicator.style.display = 'none';
                appendMessage("Произошла ошибка при соединении с сетью.", 'ai');
                console.error("Fetch Error:", error);
            }
        }

        // Обработчики кликов и Enter
        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
